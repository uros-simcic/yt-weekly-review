# Instance workflow: copy this file into your private instance repo at
# .github/workflows/collect.yml. It checks out the engine (public code)
# next to your instance (config + state) and runs the collector from the
# instance root, so config.json and state/ resolve to YOUR files.
name: collect

on:
  schedule:
    # Daily at 05:30 UTC. On a cron event there are no inputs, so both
    # DRY_RUN and TEST_VIDEO_ID come through empty and the real pipeline
    # runs. GitHub cron is best-effort (delays of 5-30 min are normal);
    # lookback_days overlaps by a day and the ledger dedupes, so a late
    # or missed run never drops or duplicates a video.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List and filter only (no Gemini calls)"
        type: boolean
        default: true
      test_video_id:
        description: "Summarize this one video id and print takes (overrides dry_run)"
        type: string
        default: ""

# contents: write is needed for the state-commit step below (a real run
# updates state/processed.json and state/summaries.json and pushes them
# back, the only way the ledger survives past this ephemeral runner).
permissions:
  contents: write

# One pipeline run at a time, queued rather than cancelled: overlapping
# runs are one of the duplication/token-burn risks the design rules out.
concurrency:
  group: yt-weekly-review
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # Worst-case day: ~13 requests at 60s pacing plus 1-2 min server-side
    # video processing each can pass 30 minutes; typical days finish in
    # well under 10.
    timeout-minutes: 45
    steps:
      # Your instance: config.json + state/
      - uses: actions/checkout@v4
      # The engine: code only. Tracking master means instances always run
      # the latest engine; point `repository:` (and optionally `ref:`) at
      # your own copy if you'd rather pin.
      - uses: actions/checkout@v4
        with:
          repository: uros-simcic/yt-weekly-review
          path: engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run collector
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          TEST_VIDEO_ID: ${{ inputs.test_video_id }}
        run: |
          if [ -n "$TEST_VIDEO_ID" ]; then
            python engine/collect.py --summarize-one "$TEST_VIDEO_ID"
          elif [ "$DRY_RUN" = "true" ]; then
            python engine/collect.py --dry-run
          else
            python engine/collect.py
          fi
      # Runs regardless of the step above's outcome: run_daily() saves
      # state in a finally block even on a mid-run crash, and dry runs /
      # single-video tests never touch state/ at all, so this is a no-op
      # for them (nothing staged -> nothing committed).
      - name: Commit state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "chore(state): $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
